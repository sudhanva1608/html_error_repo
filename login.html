<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | MindMetric</title>
<link rel="stylesheet" href="css/auth.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="auth-container">
<div class="auth-card">
<h2>Welcome Back</h2>
<p>Login to continue your mental health journey</p>

<form id="loginForm" novalidate>
<div class="input-group">
<input type="email" id="loginEmail" placeholder=" " autocomplete="email" required>
<label for="loginEmail">Email Address</label>
</div>

<div class="input-group">
<input type="password" id="loginPassword" placeholder=" " autocomplete="current-password" required>
<label for="loginPassword">Password</label>
</div>

<button class="auth-btn" type="submit"><span>Login</span></button>
</form>

<p class="switch-text">
Don't have an account?
<a href="register.html">Register</a>
</p>
</div>
</div>
<script src="js/script.js" defer></script>
</body>
</html>
